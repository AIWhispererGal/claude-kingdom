<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Royal Dashboard — House ClaudeCode</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root {
    --midnight: #0d1b2a;
    --midnight-2: #122438;
    --gold: #c9a84c;
    --gold-dim: #8c7430;
    --parchment: #f2e8d5;
    --amber: #d99a2b;
    --green: #4f9d69;
    --red: #b3463c;
    --grey: #6f6a5e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(circle at 20% 10%, #16283c 0%, var(--midnight) 55%) fixed, var(--midnight);
    color: var(--parchment);
    font-family: "IM Fell English", Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    min-height: 100vh;
  }
  h1, h2, h3, .cinzel { font-family: "Cinzel", serif; letter-spacing: 0.04em; }
  a { color: var(--gold); }

  nav {
    display: flex; justify-content: center; gap: 2rem;
    padding: 0.8rem; border-bottom: 2px solid var(--gold-dim);
    background: rgba(0,0,0,0.25);
  }
  nav a {
    font-family: "Cinzel", serif; text-decoration: none; font-size: 0.95rem;
    padding: 0.2rem 0.6rem; border-radius: 3px;
  }
  nav a.active { color: var(--midnight); background: var(--gold); }

  header.crest { text-align: center; padding: 1.4rem 1rem 0.4rem; }
  header.crest h1 { margin: 0; font-size: 2.1rem; color: var(--gold); text-shadow: 0 2px 6px #000; }
  header.crest p.sub { margin: 0.3rem 0 0; font-style: italic; opacity: 0.85; }

  /* ===== Tabs ===== */
  .tabs {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem;
    max-width: 1100px; margin: 1rem auto 0; padding: 0 1rem;
  }
  .tab-btn {
    font-family: "Cinzel", serif; font-size: 0.95rem;
    background: var(--midnight-2);
    color: var(--parchment);
    border: 1px solid var(--gold-dim);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    padding: 0.55rem 1.2rem; cursor: pointer;
  }
  .tab-btn.active { background: var(--gold); color: var(--midnight); font-weight: 600; }

  .panel-wrap { max-width: 1100px; margin: 0 auto 4rem; padding: 1.2rem 1rem; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .card {
    background: linear-gradient(135deg, #f6eede 0%, var(--parchment) 40%, #e9dcc0 100%);
    color: #2a2113;
    border: 2px solid var(--gold-dim);
    border-radius: 6px;
    box-shadow: 0 5px 16px rgba(0,0,0,0.35), inset 0 0 26px rgba(201,168,76,0.1);
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
  }
  .card h3 { margin: 0 0 0.4rem; color: #5a4416; }
  .notice { font-style: italic; opacity: 0.85; padding: 1rem; text-align: center; }

  /* ===== Chronicle ===== */
  .session-card { display: grid; grid-template-columns: auto 1fr; gap: 0.8rem; align-items: start; }
  .session-num {
    font-family: "Cinzel", serif; font-size: 1.5rem; font-weight: 700;
    color: var(--parchment);
    background: var(--gold-dim);
    border-radius: 8px;
    width: 3.4rem; height: 3.4rem;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; line-height: 1;
  }
  .session-num small { font-size: 0.55rem; font-family: "IM Fell English"; opacity: 0.85; }
  .noble-name { font-family: "Cinzel", serif; font-weight: 600; font-size: 1.1rem; color: #4a3a14; }
  .quest-text { font-style: italic; margin: 0.2rem 0 0.5rem; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; font-size: 0.9rem; }
  .badge {
    font-family: "Cinzel", serif; font-size: 0.72rem; letter-spacing: 0.05em;
    padding: 0.15rem 0.6rem; border-radius: 12px; color: #fff;
  }
  .out-VICTORY { background: var(--green); }
  .out-PARTIAL { background: var(--amber); color: #2a2113; }
  .out-DEFEAT  { background: var(--red); }
  .medal-chip { background: rgba(201,168,76,0.25); border: 1px solid var(--gold-dim); color: #4a3a14; padding: 0.1rem 0.5rem; border-radius: 10px; font-size: 0.82rem; }
  .court-chip { background: rgba(13,27,42,0.08); border: 1px solid rgba(140,116,48,0.4); padding: 0.1rem 0.45rem; border-radius: 4px; font-size: 0.78rem; }
  .violation { color: var(--red); font-size: 0.85rem; margin-top: 0.4rem; }

  /* ===== Hall of Honors ===== */
  .hat-display { text-align: center; }
  .big-hat { font-size: 4.5rem; line-height: 1; }
  .feather-row { font-size: 2rem; letter-spacing: 0.25rem; margin: 0.3rem 0; }
  .bearer-name { font-family: "Cinzel", serif; font-size: 1.15rem; color: #4a3a14; }
  .feather-list { list-style: none; padding: 0; margin: 0.8rem auto; max-width: 560px; text-align: left; }
  .feather-list li { border-left: 3px solid var(--gold-dim); padding: 0.3rem 0.7rem; margin: 0.4rem 0; }
  .feather-list .ftype { font-family: "Cinzel", serif; font-weight: 600; color: #5a4416; }

  .lineage { list-style: none; padding: 0; margin: 0; }
  .lineage li { padding: 0.4rem 0.6rem; border-bottom: 1px dashed var(--gold-dim); }
  .lineage li:last-child { border-bottom: none; }

  .tier-group { margin-bottom: 1.1rem; }
  .tier-head { font-family: "Cinzel", serif; color: #5a4416; border-bottom: 1px solid var(--gold-dim); padding-bottom: 0.2rem; margin-bottom: 0.5rem; }
  .award-row {
    display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.45rem 0.5rem; border-bottom: 1px solid rgba(140,116,48,0.25);
  }
  .award-emoji { font-size: 1.5rem; }
  .award-name { font-family: "Cinzel", serif; font-weight: 600; color: #4a3a14; }
  .award-recipient { font-size: 0.9rem; }
  .auth-tag { font-size: 0.7rem; font-family: "Cinzel", serif; padding: 0.1rem 0.5rem; border-radius: 10px; }
  .auth-batman { background: var(--midnight); color: var(--gold); }
  .auth-duke { background: rgba(201,168,76,0.3); color: #4a3a14; border: 1px solid var(--gold-dim); }
  .self-claim { color: var(--red); font-weight: 700; font-size: 0.85rem; }

  .legend-row { display: flex; gap: 0.5rem; align-items: baseline; padding: 0.2rem 0; font-size: 0.9rem; }
  .legend-row .le { font-size: 1.1rem; }

  /* ===== Family Tree ===== */
  .role-block { margin-bottom: 1.3rem; }
  .role-title { font-family: "Cinzel", serif; font-size: 1.15rem; color: var(--gold); margin: 0 0 0.5rem; }
  .family-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.8rem; }
  .family-card {
    border: 2px solid var(--gold-dim); border-radius: 6px; padding: 0.8rem 1rem;
    background: linear-gradient(135deg, #f6eede 0%, var(--parchment) 100%); color: #2a2113;
  }
  .family-card.extinct {
    filter: grayscale(0.85); opacity: 0.8;
    border-color: var(--grey);
    background: linear-gradient(135deg, #d8d4cb, #c9c5ba);
  }
  .family-card h4 { margin: 0 0 0.3rem; font-family: "Cinzel", serif; font-size: 1.05rem; color: #4a3a14; }
  .status-badge { font-family: "Cinzel", serif; font-size: 0.65rem; padding: 0.1rem 0.5rem; border-radius: 10px; color: #fff; background: var(--green); margin-left: 0.4rem; }
  .status-badge.EXTINCT { background: var(--grey); }
  .status-badge.STRUGGLING, .status-badge.ENDANGERED { background: var(--amber); color: #2a2113; }
  .fam-philosophy { font-style: italic; font-size: 0.9rem; margin: 0.4rem 0; }
  .fam-stats { font-size: 0.85rem; display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; }
  .fam-stats b { color: #5a4416; }
  .death-note { margin-top: 0.5rem; padding: 0.4rem 0.6rem; background: rgba(0,0,0,0.08); border-left: 3px solid var(--grey); font-size: 0.85rem; }
  .death-note .skull { font-style: normal; }

  footer { text-align: center; opacity: 0.6; font-size: 0.85rem; padding: 1.5rem; }
</style>
</head>
<body>

<nav>
  <a href="index.html">⚜️ The Summons Maker</a>
  <a href="dashboard.html" class="active">📜 The Royal Dashboard</a>
</nav>

<header class="crest">
  <h1>📜 The Royal Dashboard 📜</h1>
  <p class="sub">The living memory of House ClaudeCode</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="chronicle">📜 The Chronicle</button>
  <button class="tab-btn" data-tab="honors">🏅 The Hall of Honors</button>
  <button class="tab-btn" data-tab="tree">🌳 The Family Tree</button>
</div>

<div class="panel-wrap">
  <section class="tab-panel active" id="chronicle"><div class="notice">Unrolling the chronicle…</div></section>
  <section class="tab-panel" id="honors"><div class="notice">Polishing the honors…</div></section>
  <section class="tab-panel" id="tree"><div class="notice">Tracing the bloodlines…</div></section>
</div>

<footer>House ClaudeCode · INVESTIGATE. BUILD. VERIFY. VOW. REMEMBER.</footer>

<script>
/* ======================================================================
   THE ROYAL DASHBOARD — three tabs over the Kingdom's JSON archives.
   All data fetched via ../ relative paths; every fetch guarded.
   ====================================================================== */

async function loadJSON(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } catch (err) {
    console.warn("Could not load " + path, err);
    return null;
  }
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
  });
}

function missing(name) {
  return '<div class="notice">The archives for ' + escapeHtml(name) + ' are not yet scribed.</div>';
}

/* ---- Tab switching ---- */
document.querySelectorAll(".tab-btn").forEach(function (btn) {
  btn.addEventListener("click", function () {
    document.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
    document.querySelectorAll(".tab-panel").forEach(function (p) { p.classList.remove("active"); });
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

/* ======================================================================
   TAB 1 — THE CHRONICLE
   ====================================================================== */
function renderChronicle(data) {
  const el = document.getElementById("chronicle");
  if (!data || !Array.isArray(data.sessions) || !data.sessions.length) {
    el.innerHTML = missing("the Chronicle");
    return;
  }
  // newest first
  const sessions = data.sessions.slice().sort(function (a, b) { return b.session - a.session; });
  el.innerHTML = sessions.map(function (s) {
    const outClass = "out-" + (s.outcome || "").toUpperCase();
    const medals = (s.medals || []).map(function (m) {
      return '<span class="medal-chip">🏅 ' + escapeHtml(m) + "</span>";
    }).join("");
    const court = (s.court || []).map(function (c) {
      return '<span class="court-chip">' + escapeHtml(c) + "</span>";
    }).join("");
    const courtCount = (s.court || []).length;
    const viol = (s.vow_violations && s.vow_violations.length)
      ? '<div class="violation">⚠ Vow violation: ' +
          (s.vow_violations || []).map(escapeHtml).join("; ") + "</div>"
      : "";
    return '<div class="card session-card">' +
      '<div class="session-num">' + escapeHtml(s.session) + '<small>session</small></div>' +
      "<div>" +
        '<div class="noble-name">' + escapeHtml(s.noble) +
          ' <span class="badge ' + outClass + '">' + escapeHtml(s.outcome) + "</span></div>" +
        '<div class="quest-text">“' + escapeHtml(s.quest) + '”</div>' +
        '<div class="meta-row"><span><b>Court (' + courtCount + "):</b></span>" + court + "</div>" +
        (medals ? '<div class="meta-row" style="margin-top:0.4rem;">' + medals + "</div>" : "") +
        (s.notes ? '<div style="margin-top:0.5rem;font-size:0.9rem;opacity:0.85;">' + escapeHtml(s.notes) + "</div>" : "") +
        viol +
      "</div>" +
    "</div>";
  }).join("");
}

/* ======================================================================
   TAB 2 — THE HALL OF HONORS
   ====================================================================== */
function renderHonors(hat, broom, awarded, catalog) {
  const el = document.getElementById("honors");
  let html = "";

  /* --- The Hat --- */
  if (hat && hat.current_bearer) {
    const fc = hat.feather_count || 0;
    const featherRow = "🪶".repeat(fc) || "—";
    const feathers = (hat.feathers || []).map(function (f) {
      return "<li><span class=\"ftype\">🪶 " + escapeHtml(f.type) + "</span> — " +
             escapeHtml(f.description) + " <em>(Session " + escapeHtml(f.session) + ", by " +
             escapeHtml(f.granted_by) + ")</em></li>";
    }).join("");
    const lineage = (hat.hat_history || []).map(function (h) {
      return "<li>🎩 <strong>" + escapeHtml(h.bearer) + "</strong> — inducted Session " +
             escapeHtml(h.session_inducted) + ", " + escapeHtml(h.feathers_accumulated) +
             " feather(s). <em>" + escapeHtml(h.reason) + "</em>" +
             (h.passed_to ? "<br>↳ " + escapeHtml(h.passed_to) : "") + "</li>";
    }).join("");
    html += '<div class="card hat-display">' +
        '<div class="big-hat">🎩</div>' +
        '<div class="feather-row">' + featherRow + "</div>" +
        '<div class="bearer-name">' + escapeHtml(hat.current_bearer) + "</div>" +
        '<div style="font-size:0.85rem;opacity:0.8;">Order of Merlin — bearer since Session ' +
          escapeHtml(hat.session_awarded) + ' · ' + fc + ' feathers</div>' +
        (feathers ? '<ul class="feather-list">' + feathers + "</ul>" : "") +
      "</div>";
    if (lineage) {
      html += '<div class="card"><h3>🎩 The Lineage of the Hat</h3><ul class="lineage">' + lineage +
              "<li>↳ <strong>" + escapeHtml(hat.current_bearer) + "</strong> (current bearer)</li></ul></div>";
    }
  } else {
    html += '<div class="card">' + missing("the Sacred Floppy Hat") + "</div>";
  }

  /* --- The Broom --- */
  if (broom && Array.isArray(broom.recipients) && broom.recipients.length) {
    const rows = broom.recipients.map(function (r) {
      return "<li>🧹 <strong>" + escapeHtml(r.recipient) + "</strong> — Session " +
             escapeHtml(r.session) + ". <em>" + escapeHtml(r.reason) + "</em> (by " +
             escapeHtml(r.granted_by) + ")</li>";
    }).join("");
    html += '<div class="card"><h3>🧹 The Broom of Distinction</h3>' +
            '<div style="font-size:0.9rem;opacity:0.85;margin-bottom:0.4rem;">Current bearer: <strong>' +
              escapeHtml(broom.current_bearer) + "</strong></div>" +
            '<ul class="lineage">' + rows + "</ul></div>";
  } else {
    html += '<div class="card"><h3>🧹 The Broom of Distinction</h3>' + missing("the Broom") + "</div>";
  }

  /* --- All awards, grouped by tier --- */
  if (awarded && Array.isArray(awarded.awards) && awarded.awards.length) {
    const tierOrder = ["ORDER", "EPIC", "STANDARD", "MINOR", "FAMILY", "INFORMAL"];
    const groups = {};
    awarded.awards.forEach(function (a) {
      const t = (a.tier || "OTHER").toUpperCase();
      (groups[t] = groups[t] || []).push(a);
    });
    const tiers = tierOrder.filter(function (t) { return groups[t]; })
      .concat(Object.keys(groups).filter(function (t) { return tierOrder.indexOf(t) === -1; }));

    let awardsHtml = '<div class="card"><h3>🏆 The Roster of Honors</h3>';
    tiers.forEach(function (t) {
      awardsHtml += '<div class="tier-group"><div class="tier-head">' + escapeHtml(t) + " TIER</div>";
      groups[t].forEach(function (a) {
        const isBatman = /batman/i.test(a.granting_authority || "");
        const authTag = '<span class="auth-tag ' + (isBatman ? "auth-batman" : "auth-duke") + '">' +
                        escapeHtml(a.granting_authority || "—") +
                        (a.batman_ratified ? " ✓" : "") + "</span>";
        const selfTag = a.self_claimed ? '<span class="self-claim">😤 SELF-CLAIMED</span>' : "";
        awardsHtml += '<div class="award-row">' +
            '<span class="award-emoji">' + escapeHtml(a.emoji || "🏅") + "</span>" +
            "<span>" +
              '<span class="award-name">' + escapeHtml(a.honor) + "</span> " +
              '<span class="award-recipient">→ ' + escapeHtml(a.recipient) +
                " <em>(S" + escapeHtml(a.session) + ")</em></span>" +
            "</span>" +
            authTag + selfTag +
          "</div>";
      });
      awardsHtml += "</div>";
    });
    awardsHtml += "</div>";
    html += awardsHtml;
  } else {
    html += '<div class="card"><h3>🏆 The Roster of Honors</h3>' + missing("awarded honors") + "</div>";
  }

  /* --- Catalog legend (reference) --- */
  if (catalog && Array.isArray(catalog.honors) && catalog.honors.length) {
    const legend = catalog.honors.map(function (h) {
      return '<div class="legend-row"><span class="le">' + escapeHtml(h.emoji) + "</span>" +
             "<span><strong>" + escapeHtml(h.name) + "</strong> <em>(" + escapeHtml(h.tier) +
             ")</em> — " + escapeHtml(h.description) + "</span></div>";
    }).join("");
    html += '<div class="card"><h3>📖 Catalog of Honors (reference)</h3>' + legend + "</div>";
  }

  el.innerHTML = html;
}

/* ======================================================================
   TAB 3 — THE FAMILY TREE
   ====================================================================== */
function renderTree(registry, extinctions) {
  const el = document.getElementById("tree");
  if (!registry || !Array.isArray(registry.roles)) {
    el.innerHTML = missing("the Family Tree");
    return;
  }

  // Build a lookup of extinct families (role+family -> reason) from extinctions.json
  const extMap = {};
  if (extinctions && Array.isArray(extinctions.extinctions)) {
    extinctions.extinctions.forEach(function (e) {
      const key = (e.role || "").toLowerCase() + "::" + (e.family || "").toUpperCase();
      extMap[key] = e;
    });
  }

  const families = registry.families || {};
  let html = "";

  registry.roles.forEach(function (role) {
    const key = role.name.toLowerCase();
    const fams = families[key] || [];
    if (!fams.length) return; // skip roles with no seated families

    let cards = fams.map(function (f) {
      const extByList = extMap[key + "::" + (f.name || "").toUpperCase()];
      const isExtinct = (f.status === "EXTINCT") || !!extByList;
      const status = isExtinct ? "EXTINCT" : (f.status || "ACTIVE");
      const wins = f.victories != null ? f.victories : "?";
      const losses = f.failures != null ? f.failures : "?";
      const notable = (f.notable_sessions || []).join(", ") || "—";

      // death note: prefer extinctions.json reason, else a generic note
      let deathNote = "";
      if (isExtinct) {
        const reason = (extByList && extByList.reason) ? extByList.reason : "Declared extinct; skills archived.";
        const dSession = (extByList && extByList.session) ? " (Session " + escapeHtml(extByList.session) + ")" : "";
        deathNote = '<div class="death-note"><span class="skull">🕯️</span> <strong>Death note' +
                    dSession + ':</strong> ' + escapeHtml(reason) + "</div>";
      }

      return '<div class="family-card' + (isExtinct ? " extinct" : "") + '">' +
          "<h4>" + escapeHtml(f.name) +
            '<span class="status-badge ' + escapeHtml(status) + '">' + escapeHtml(status) + "</span></h4>" +
          '<div class="fam-philosophy">“' + escapeHtml(f.philosophy) + '”</div>' +
          '<div class="fam-stats">' +
            "<span><b>Skills:</b> " + escapeHtml(f.skill_count) + "</span>" +
            "<span><b>Founded:</b> S" + escapeHtml(f.founded_session) + "</span>" +
            "<span><b>Served:</b> " + escapeHtml(f.sessions_served) + "</span>" +
            "<span><b>Record:</b> " + escapeHtml(wins) + "W / " + escapeHtml(losses) + "L</span>" +
            "<span><b>Vows broken:</b> " + escapeHtml(f.vow_violations) + "</span>" +
          "</div>" +
          '<div class="fam-stats" style="margin-top:0.3rem;"><span><b>Notable:</b> S' + escapeHtml(notable) + "</span></div>" +
          deathNote +
        "</div>";
    }).join("");

    html += '<div class="role-block"><div class="role-title">' +
            escapeHtml(role.emoji || "") + " " + escapeHtml(role.name) +
            ' <span style="font-size:0.8rem;opacity:0.7;font-family:\'IM Fell English\';">— ' +
            escapeHtml(role.tagline || "") + "</span></div>" +
            '<div class="family-grid">' + cards + "</div></div>";
  });

  // Note: BLACKSMITH (IRONFORGE + HAMMERFALL) naturally render side-by-side
  // in their role-block grid, highlighting the divergence of the two lineages.

  el.innerHTML = html || missing("the Family Tree");
}

/* ======================================================================
   BOOT — fetch every archive in parallel, render each tab independently.
   ====================================================================== */
(async function init() {
  const [sessions, hat, broom, awarded, catalog, registry, extinctions] = await Promise.all([
    loadJSON("../history/sessions.json"),
    loadJSON("../honors/THE_HAT.json"),
    loadJSON("../honors/BROOM.json"),
    loadJSON("../honors/awarded.json"),
    loadJSON("../honors/catalog.json"),
    loadJSON("../agents/REGISTRY.json"),
    loadJSON("../history/extinctions.json")
  ]);

  renderChronicle(sessions);
  renderHonors(hat, broom, awarded, catalog);
  renderTree(registry, extinctions);
})();
</script>
</body>
</html>
